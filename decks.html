<!doctype html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoGoat Deck Library</title>
<style>
* { box-sizing: border-box; }
body { margin:0; background:#0b0b0b; color:#f2f2f2; font-family:system-ui,sans-serif; }
header {
  padding:14px 20px;
  border-bottom:1px solid #222;
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}
header h2 { margin:0; font-size:18px; }
header a {
  font-size:13px;
  color:#8fff8f;
  text-decoration:none;
  border:1px solid #2a6a2a;
  padding:6px 12px;
  border-radius:8px;
}
header a:hover { background:#1a3a1a; }
.spacer { flex:1; }

.filters {
padding: 14px 20px;
display: flex;
gap: 10px;
flex-wrap: wrap;
border-bottom: 1px solid #1a1a1a;
}
.filters input, .filters select {
background: #111;
border: 1px solid #333;
color: white;
padding: 7px 10px;
border-radius: 8px;
font: inherit;
}

.grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 14px;
padding: 20px;
}

.deck-card {
background: #101010;
border: 1px solid #222;
border-radius: 12px;
padding: 16px;
display: flex;
flex-direction: column;
gap: 8px;
text-decoration: none;
color: inherit;
transition: border-color .15s, background .15s;
}
.deck-card:hover {
border-color: #444;
background: #141414;
}
.deck-card .title {
font-weight: 700;
font-size: 15px;
}
.deck-card .meta {
font-size: 12px;
opacity: .6;
}
.deck-card .archetype {
font-size: 12px;
color: #8fff8f;
background: #1a3a1a;
border: 1px solid #2a6a2a;
border-radius: 999px;
padding: 2px 10px;
width: fit-content;
}
.deck-card .desc {
font-size: 13px;
opacity: .75;
overflow: hidden;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
}
.deck-card .counts {
font-size: 12px;
opacity: .5;
margin-top: auto;
}

#loading { text-align:center; padding:60px; opacity:.5; }
#empty   { text-align:center; padding:60px; opacity:.5; }
</style>

</head>
<body>

<header>
  <h2>📚 NeoGoat Deck Library</h2>
  <div class="spacer"></div>
  <a href="/index.html">🛠️ Deck Builder</a>
</header>

<div class="filters">
  <input id="fSearch" placeholder="Search by title or author..." style="width:220px">
  <input id="fArchetype" placeholder="Archetype..." style="width:160px">
</div>

<div id="loading">Loading decks...</div>
<div id="empty" style="display:none">No decks published yet.</div>
<div class="grid" id="grid" style="display:none"></div>

<script>
const SUPABASE_URL = "https://tpkqfvizizjbunpbutlo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwa3Fmdml6aXpqYnVucGJ1dGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA0ODksImV4cCI6MjA5NDAzNjQ4OX0.Vjf2aUfYcHzAR6f3kFBoelJNpP-l0ULwdtQsetV3Eng";

let allDecks = [];

async function loadDecks() {
  const res = await fetch(
    ${SUPABASE_URL}/rest/v1/decks?is_public=eq.true&order=created_at.desc&select=id,slug,title,author_name,archetype,description,main_deck,extra_deck,side_deck,format,created_at,
    {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': Bearer ${SUPABASE_ANON_KEY}
      }
    }
  );
  return await res.json();
}

function totalCards(arr) {
  if (!Array.isArray(arr)) return 0;
  return arr.reduce((s, c) => s + (c.qty || 1), 0);
}

function renderGrid(decks) {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  grid.innerHTML = "";

  if (!decks.length) {
    grid.style.display = "none";
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";
  grid.style.display = "grid";

  for (const d of decks) {
    const date = new Date(d.created_at).toLocaleDateString('es-MX', { year:'numeric', month:'short', day:'numeric' });
    const mainCount = totalCards(d.main_deck);
    const extraCount = totalCards(d.extra_deck);

    const a = document.createElement("a");
    a.className = "deck-card";
    a.href = /deck.html?slug=${d.slug};
    a.innerHTML = `
      <div class="title">${escHtml(d.title)}</div>
      ${d.archetype ? <div class="archetype">${escHtml(d.archetype)}</div> : ''}
      <div class="meta">Por ${escHtml(d.author_name)} · ${escHtml(d.format || '')} · ${date}</div>
      ${d.description ? <div class="desc">${escHtml(d.description)}</div> : ''}
      <div class="counts">Main: ${mainCount}${extraCount ? ` · Extra: ${extraCount}` : ''}</div>
    `;
    grid.appendChild(a);
  }
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function applyFilters() {
  const q = document.getElementById("fSearch").value.toLowerCase();
  const a = document.getElementById("fArchetype").value.toLowerCase();
  const filtered = allDecks.filter(d => {
    const matchQ = !q || d.title.toLowerCase().includes(q) || d.author_name.toLowerCase().includes(q);
    const matchA = !a || (d.archetype || '').toLowerCase().includes(a);
    return matchQ && matchA;
  });
  renderGrid(filtered);
}

document.getElementById("fSearch").addEventListener("input", applyFilters);
document.getElementById("fArchetype").addEventListener("input", applyFilters);

(async () => {
  try {
    allDecks = await loadDecks();
    document.getElementById("loading").style.display = "none";
    renderGrid(allDecks);
  } catch(e) {
    document.getElementById("loading").textContent = "Error loading decks: " + e.message;
  }
})();
</script>

</body>
</html>
