<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="neogoatbuilderlogo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoGoat Deck Library</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#05070c;
  --panel:#0a0f18;
  --cyan:#00e5ff;
  --cyan2:#70f5ff;
  --violet:#9b5cff;
  --green:#73ff9b;
  --red:#ff5d73;
  --muted:#8ea0bb;
}

body{
  margin:0;
  color:#eafcff;
  font-family:system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 18% 15%,rgba(0,229,255,.12),transparent 28%),
    radial-gradient(circle at 75% 22%,rgba(155,92,255,.15),transparent 30%),
    radial-gradient(circle at 45% 85%,rgba(255,61,242,.07),transparent 35%),
    linear-gradient(180deg,#08111f,#05070c 55%,#020306);
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.13;
  background:
    linear-gradient(rgba(0,229,255,.08) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.08) 1px,transparent 1px);
  background-size:36px 36px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),rgba(0,0,0,.15));
}

body:after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(transparent 50%,rgba(0,0,0,.13) 51%);
  background-size:100% 4px;
  opacity:.22;
}

button,input,select{font:inherit;}

header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 18px;
  background:linear-gradient(90deg,rgba(8,16,30,.98),rgba(13,10,25,.98));
  border-bottom:1px solid rgba(0,229,255,.45);
  box-shadow:0 0 28px rgba(0,229,255,.13),0 0 36px rgba(155,92,255,.09);
  position:sticky;
  top:0;
  z-index:10;
  flex-wrap:wrap;
}

.logoMark{
  width:31px;
  height:31px;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,rgba(0,229,255,.18),rgba(155,92,255,.18));
  border:1px solid rgba(0,229,255,.65);
  color:var(--cyan2);
  box-shadow:0 0 16px rgba(0,229,255,.28),inset 0 0 12px rgba(155,92,255,.16);
  font-weight:900;
}

header h2{
  margin:0;
  font-size:18px;
  font-weight:900;
  color:#f2feff;
  text-shadow:0 0 12px rgba(0,229,255,.38);
}

.spacer{flex:1;}

.navBtn{
  font-size:13px;
  color:#dffcff;
  text-decoration:none;
  border:1px solid rgba(0,229,255,.32);
  padding:8px 13px;
  border-radius:9px;
  background:linear-gradient(180deg,rgba(16,27,45,.95),rgba(5,8,14,.95));
  font-weight:800;
}

.navBtn:hover{
  border-color:rgba(0,229,255,.75);
  box-shadow:0 0 18px rgba(0,229,255,.22),inset 0 0 14px rgba(0,229,255,.08);
}

.hero{
  position:relative;
  z-index:1;
  max-width:1180px;
  margin:24px auto 0;
  padding:0 20px;
}

.heroBox{
  border:1px solid rgba(0,229,255,.26);
  border-radius:20px;
  background:
    radial-gradient(circle at 12% 20%,rgba(0,229,255,.10),transparent 35%),
    radial-gradient(circle at 85% 15%,rgba(155,92,255,.12),transparent 35%),
    linear-gradient(180deg,rgba(10,16,26,.88),rgba(3,5,9,.92));
  padding:22px;
  box-shadow:0 14px 34px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.04);
  overflow:hidden;
  position:relative;
}

.heroBox:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(0,229,255,.22),transparent 30%,transparent 70%,rgba(155,92,255,.20));
  opacity:.16;
  pointer-events:none;
}

.heroBox > *{position:relative;z-index:1;}

.heroBox h1{
  font-size:32px;
  line-height:1.1;
  color:#f4feff;
  text-shadow:0 0 14px rgba(0,229,255,.28);
  margin-bottom:8px;
}

.heroBox p{
  color:#9db0ca;
  line-height:1.5;
  font-size:14px;
}

.filters{
  position:relative;
  z-index:1;
  max-width:1180px;
  margin:18px auto 0;
  padding:0 20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filters input,.filters select{
  background:rgba(4,7,12,.95);
  border:1px solid rgba(0,229,255,.22);
  color:#eafcff;
  padding:9px 11px;
  border-radius:10px;
  box-shadow:inset 0 0 12px rgba(0,0,0,.25);
}

.filters input:focus,.filters select:focus{
  outline:none;
  border-color:var(--cyan);
  box-shadow:0 0 14px rgba(0,229,255,.18),inset 0 0 10px rgba(0,229,255,.05);
}

#countText{
  position:relative;
  z-index:1;
  max-width:1180px;
  margin:10px auto 0;
  padding:0 20px;
  color:#8395ad;
  font-size:12px;
}

.grid{
  position:relative;
  z-index:1;
  max-width:1180px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
  padding:20px;
}

.deck-card{
  background:
    linear-gradient(135deg,rgba(0,229,255,.04),transparent 32%),
    linear-gradient(180deg,rgba(10,16,26,.88),rgba(3,5,9,.92));
  border:1px solid rgba(0,229,255,.22);
  border-radius:16px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  text-decoration:none;
  color:inherit;
  transition:.15s ease;
  min-height:190px;
  position:relative;
  overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 10px 22px rgba(0,0,0,.24);
}

.deck-card:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(0,229,255,.18),transparent 30%,transparent 70%,rgba(155,92,255,.16));
  opacity:.10;
  pointer-events:none;
}

.deck-card:hover{
  border-color:rgba(0,229,255,.58);
  transform:translateY(-2px);
  box-shadow:0 16px 30px rgba(0,0,0,.34),0 0 20px rgba(0,229,255,.14);
}

.deck-card > *{position:relative;z-index:1;}

.deck-card .title{
  font-weight:900;
  font-size:16px;
  color:#f4feff;
  text-shadow:0 0 8px rgba(0,229,255,.18);
}

.deck-card .meta{
  font-size:12px;
  color:#8ea0bb;
}

.deck-card .archetype{
  font-size:12px;
  color:#a5ffbd;
  background:rgba(21,78,44,.45);
  border:1px solid rgba(115,255,155,.42);
  border-radius:999px;
  padding:4px 10px;
  width:fit-content;
  font-weight:800;
}

.deck-card .desc{
  font-size:13px;
  color:#c2d4ea;
  line-height:1.45;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
}

.deck-card .counts{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  margin-top:auto;
}

.countBadge{
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  background:rgba(0,229,255,.08);
  border:1px solid rgba(0,229,255,.28);
  color:#dffcff;
}

.countBadge.extra{
  background:rgba(155,92,255,.10);
  border-color:rgba(155,92,255,.36);
}

.countBadge.side{
  background:rgba(115,255,155,.08);
  border-color:rgba(115,255,155,.28);
}

#loading,#empty{
  position:relative;
  z-index:1;
  text-align:center;
  padding:70px 20px;
  color:#8ea0bb;
}

@media(max-width:650px){
  header h2{width:calc(100% - 44px);}
  .heroBox h1{font-size:25px;}
  .filters input{width:100%!important;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="logoMark">◇</div>

  <div style="
    display:flex;
    flex-direction:column;
    gap:2px;
  ">

    <h2 style="margin:0;">
      NeoGoat Deck Library
    </h2>

    <div style="
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    ">

      <span style="
        font-size:12px;
        font-weight:900;
        color:#7dd3fc;
        text-shadow:0 0 10px rgba(125,211,252,.6);
        letter-spacing:.05em;
      ">
        APRIL 2026 FORMAT
      </span>

      <a
        href="https://neogoatformat.blogspot.com/"
        target="_blank"
        style="
          font-size:11px;
          color:#86efac;
          text-decoration:none;
          border:1px solid rgba(134,239,172,.4);
          background:rgba(22,163,74,.12);
          padding:4px 10px;
          border-radius:999px;
          font-weight:800;
        "
      >
        Visit the NeoGoat Blog ↗
      </a>

    </div>

  </div>

  <div class="spacer"></div>

  <a class="navBtn" href="/index.html">Deck Builder</a>
</header>

<section class="hero">
  <div class="heroBox">
    <h1>Published Decks</h1>
    <p>Browse community-submitted NeoGoat decks, archetypes, and format experiments.</p>
  </div>
</section>

<div class="filters">
  <input id="fSearch" placeholder="Search by title or author..." style="width:250px">
  <input id="fArchetype" placeholder="Archetype..." style="width:180px">
  <input id="fCard1" placeholder="Contains card..." style="width:220px">
  <input id="fCard2" placeholder="Contains card..." style="width:220px">
  <input id="fCard3" placeholder="Contains card..." style="width:220px">
  <select id="fFormat">
    <option value="">All formats</option>
  </select>
</div>

<div id="countText"></div>
<div id="loading">Loading decks...</div>
<div id="empty" style="display:none">No decks found.</div>
<div class="grid" id="grid" style="display:none"></div>

<script>
const SUPABASE_URL = "https://tpkqfvizizjbunpbutlo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwa3Fmdml6aXpqYnVucGJ1dGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA0ODksImV4cCI6MjA5NDAzNjQ4OX0.Vjf2aUfYcHzAR6f3kFBoelJNpP-l0ULwdtQsetV3Eng";

let allDecks=[];

async function loadDecks(){
  const res=await fetch(
    `${SUPABASE_URL}/rest/v1/decks?is_public=eq.true&order=created_at.desc&select=id,slug,title,author_name,archetype,description,main_deck,extra_deck,side_deck,format,created_at`,
    {
      headers:{
        "apikey":SUPABASE_ANON_KEY,
        "Authorization":`Bearer ${SUPABASE_ANON_KEY}`
      }
    }
  );

  if(!res.ok){
    throw new Error("Supabase error "+res.status);
  }

  return await res.json();
}

function totalCards(arr){
  if(!Array.isArray(arr))return 0;
  return arr.reduce((s,c)=>s+(Number(c.qty)||1),0);
}

function escHtml(s){
  if(!s)return "";
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function normText(s){
  return String(s||"")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[’']/g,"")
    .replace(/[^a-z0-9]+/g," ")
    .trim();
}

function deckContainsCard(deck,search){
  const q=normText(search);
  if(!q)return true;

  const allCards=[
    ...(deck.main_deck||[]),
    ...(deck.extra_deck||[]),
    ...(deck.side_deck||[])
  ];

  return allCards.some(c=>normText(c.name).includes(q));
}

function populateFormatFilter(decks){
  const sel=document.getElementById("fFormat");
  const seen={};

  decks.forEach(d=>{
    if(d.format)seen[d.format]=true;
  });

  Object.keys(seen).sort().forEach(f=>{
    const opt=document.createElement("option");
    opt.value=f;
    opt.textContent=f;
    sel.appendChild(opt);
  });
}

function renderGrid(decks){
  const grid=document.getElementById("grid");
  const empty=document.getElementById("empty");
  const countText=document.getElementById("countText");
  grid.innerHTML="";

  countText.textContent=`${decks.length} deck(s) found.`;

  if(!decks.length){
    grid.style.display="none";
    empty.style.display="block";
    return;
  }

  empty.style.display="none";
  grid.style.display="grid";

  for(const d of decks){
    const date=new Date(d.created_at).toLocaleDateString("es-MX",{year:"numeric",month:"short",day:"numeric"});
    const mainCount=totalCards(d.main_deck);
    const extraCount=totalCards(d.extra_deck);
    const sideCount=totalCards(d.side_deck);

    const a=document.createElement("a");
    a.className="deck-card";
    a.href=`/deck.html?slug=${encodeURIComponent(d.slug)}`;
    a.innerHTML=`
      <div class="title">${escHtml(d.title)}</div>
      ${d.archetype?`<div class="archetype">${escHtml(d.archetype)}</div>`:""}
      <div class="meta">By ${escHtml(d.author_name)} · ${escHtml(d.format||"")} · ${date}</div>
      ${d.description?`<div class="desc">${escHtml(d.description)}</div>`:""}
      <div class="counts">
        <span class="countBadge">Main ${mainCount}</span>
        <span class="countBadge extra">Extra ${extraCount}</span>
        <span class="countBadge side">Side ${sideCount}</span>
      </div>
    `;
    grid.appendChild(a);
  }
}

function applyFilters(){
  const q=normText(document.getElementById("fSearch").value);
  const a=normText(document.getElementById("fArchetype").value);
  const f=document.getElementById("fFormat").value;

  const c1=document.getElementById("fCard1").value;
  const c2=document.getElementById("fCard2").value;
  const c3=document.getElementById("fCard3").value;

  const filtered=allDecks.filter(d=>{
    const title=normText(d.title);
    const author=normText(d.author_name);
    const archetype=normText(d.archetype);

    const matchQ=!q||title.includes(q)||author.includes(q);
    const matchA=!a||archetype.includes(a);
    const matchF=!f||d.format===f;

    const matchC1=deckContainsCard(d,c1);
    const matchC2=deckContainsCard(d,c2);
    const matchC3=deckContainsCard(d,c3);

    return matchQ&&matchA&&matchF&&matchC1&&matchC2&&matchC3;
  });

  renderGrid(filtered);
}

document.getElementById("fSearch").addEventListener("input",applyFilters);
document.getElementById("fArchetype").addEventListener("input",applyFilters);
document.getElementById("fCard1").addEventListener("input",applyFilters);
document.getElementById("fCard2").addEventListener("input",applyFilters);
document.getElementById("fCard3").addEventListener("input",applyFilters);
document.getElementById("fFormat").addEventListener("change",applyFilters);

(async()=>{
  try{
    allDecks=await loadDecks();
    populateFormatFilter(allDecks);
    document.getElementById("loading").style.display="none";
    renderGrid(allDecks);
  }catch(e){
    document.getElementById("loading").textContent="Error loading decks: "+e.message;
  }
})();
</script>

</body>
</html>
