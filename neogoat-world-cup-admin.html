<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoGoat World Cup 2026 — Admin</title>
<link rel="icon" type="image/png" href="/neogoatbuilderlogo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--grass:#083a20;--grass2:#0d5a31;--dark:#031008;--panel:rgba(3,18,10,.92);--panel2:rgba(5,31,17,.94);--line:rgba(255,255,255,.18);--ink:#f7fff9;--muted:#b7c9bd;--gold:#ffe169;--gold2:#f7b801;--blue:#58d7ff;--green:#9dff93;--red:#ff667d;--shadow:0 18px 38px rgba(0,0,0,.28)}
body{min-height:100vh;color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 12% 8%,rgba(255,225,105,.13),transparent 25%),radial-gradient(circle at 84% 14%,rgba(88,215,255,.10),transparent 24%),repeating-linear-gradient(90deg,var(--grass) 0 120px,var(--grass2) 120px 240px)}
body:before{content:"";position:fixed;inset:18px;border:3px solid rgba(255,255,255,.18);border-radius:30px;pointer-events:none;z-index:0}
button,input,select{font:inherit}button{cursor:pointer}.page{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:18px}.hero,.card{border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,rgba(0,0,0,.62),rgba(0,0,0,.35));box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.06);overflow:hidden}.hero{padding:18px;margin-bottom:16px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}h1{font-size:clamp(30px,4vw,56px);line-height:.95;letter-spacing:-.055em;text-transform:uppercase}.subtitle{font-size:14px;color:#d6ffe0;margin-top:8px;line-height:1.45}.badges,.actions{display:flex;gap:8px;flex-wrap:wrap}.badges{margin-top:12px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.20);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:rgba(0,0,0,.28)}.pill.ok{color:#b7ffbc;border-color:rgba(157,255,147,.45);background:rgba(41,173,80,.12)}.pill.err{color:#ffd0d7;border-color:rgba(255,102,125,.45);background:rgba(255,102,125,.12)}.pill.warn{color:#ffe169;border-color:rgba(255,225,105,.45);background:rgba(255,225,105,.10)}.toolbar{display:grid;grid-template-columns:1.2fr .8fr auto;gap:10px;margin-bottom:16px}.toolbar input,.toolbar select{width:100%;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.36);color:var(--ink);border-radius:12px;padding:11px;outline:none}.btn{border:1px solid rgba(255,255,255,.20);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.34);color:#fff;font-weight:1000;font-size:13px}.btn:hover{border-color:rgba(255,255,255,.52);transform:translateY(-1px)}.btn.primary{background:linear-gradient(180deg,#fff2a3,var(--gold2));color:#211700;border-color:rgba(255,225,105,.68)}.btn.good{background:linear-gradient(180deg,#178e43,#084d23)}.btn.blue{background:linear-gradient(180deg,#1d83ac,#0a4260)}.btn.danger{background:linear-gradient(180deg,#b9263e,#66101e)}.grid{display:grid;gap:14px}.cardHead{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;justify-content:space-between;gap:10px;align-items:center;background:linear-gradient(90deg,rgba(255,225,105,.14),rgba(255,255,255,.04))}.teamName{font-size:20px;font-weight:1000}.small{font-size:12px;color:var(--muted);line-height:1.45}.cardBody{padding:14px 16px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.players{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.playerBox{border:1px solid rgba(255,255,255,.13);border-radius:16px;background:rgba(0,0,0,.24);padding:12px;min-width:0}.playerBox h3{font-size:14px;margin-bottom:8px;color:var(--gold);display:flex;justify-content:space-between;gap:8px}.deckTools{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}.tiny{padding:6px 8px;font-size:11px;border-radius:9px}pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;max-height:360px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;line-height:1.35}.issues{margin-top:12px;border-top:1px solid rgba(255,255,255,.10);padding-top:10px}.issue{border-left:4px solid var(--red);background:rgba(255,102,125,.08);padding:8px 10px;border-radius:10px;margin-top:7px;font-size:12px;line-height:1.35}.empty{padding:28px;text-align:center;color:var(--muted)}#toast{position:fixed;right:18px;bottom:18px;z-index:20;max-width:460px;border:1px solid rgba(255,255,255,.20);border-radius:16px;padding:12px 14px;background:#07180d;box-shadow:var(--shadow);display:none;font-size:13px}.sel{color:#ffe169}.hidden{display:none!important}@media(max-width:1050px){.hero,.toolbar{grid-template-columns:1fr}.players{grid-template-columns:1fr}.actions .btn{flex:1}}
</style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div>
      <h1>World Cup Admin</h1>
      <div class="subtitle">Vista rápida de registros NeoGoat World Cup. Carga borradores y enviados desde <code>team_registrations</code>. Sin magic link.</div>
      <div class="badges"><span class="pill" id="countPill">0 equipos</span><span class="pill ok" id="submittedPill">0 submitted</span><span class="pill warn" id="draftPill">0 draft</span><span class="pill err" id="invalidPill">0 inválidos</span></div>
    </div>
    <div class="actions"><button class="btn primary" id="refreshBtn">Actualizar</button><button class="btn good" id="copySubmittedBtn">Copiar submitted TXT</button><button class="btn blue" id="downloadSubmittedBtn">Descargar submitted TXT</button></div>
  </section>

  <section class="toolbar">
    <input id="searchInput" placeholder="Buscar equipo, país, correo, jugador...">
    <select id="statusFilter">
      <option value="all">Todos</option>
      <option value="submitted">Solo submitted / válidos</option>
      <option value="draft">Solo draft</option>
      <option value="invalid">Solo inválidos</option>
    </select>
    <button class="btn" id="clearBtn">Limpiar filtros</button>
  </section>

  <main id="list" class="grid"><div class="card"><div class="empty">Cargando registros...</div></div></main>
</div>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL="https://tpkqfvizizjbunpbutlo.supabase.co";
var SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwa3Fmdml6aXpqYnVucGJ1dGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA0ODksImV4cCI6MjA5NDAzNjQ4OX0.Vjf2aUfYcHzAR6f3kFBoelJNpP-l0ULwdtQsetV3Eng";
var EVENT="neogoat-world-cup-2026";
var sb=null, allRows=[];
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]})}
function toast(msg,cls){var t=$("toast");t.textContent=msg;t.className=cls||"";t.style.display="block";clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(function(){t.style.display="none"},5200)}
function isValid(r){return !!(r&&r.validation_report&&r.validation_report.valid)}
function rowStatus(r){return String(r.status||(isValid(r)?"submitted":"draft")).toLowerCase()}
function deckText(deck){deck=deck||{};if(deck.raw)return String(deck.raw);function sec(title,list){list=list||[];if(!list.length)return "# "+title+"\n";return "# "+title+"\n"+list.map(function(c){return (c.qty||1)+" "+(c.name||"")}).join("\n")}return [sec("Main",deck.main),sec("Extra",deck.extra),sec("Side",deck.side)].join("\n\n")}
function teamTxt(r){var sels=(r.selection_cards||[]).map(function(c){return c.name||c.password||""}).filter(Boolean).join(" / ")||"—";return "TEAM: "+(r.team_name||"")+"\nCOUNTRY: "+(r.country||"")+"\nCAPTAIN KEY: "+(r.captain_email||r.captain_contact||"")+"\nSTATUS: "+rowStatus(r)+" | "+(isValid(r)?"VALID":"INVALID")+"\nSELECTION CARDS: "+sels+"\n\nDECK A — "+(r.player_a_name||"")+"\n"+deckText(r.player_a_deck)+"\n\nDECK B — "+(r.player_b_name||"")+"\n"+deckText(r.player_b_deck)+"\n\nDECK C — "+(r.player_c_name||"")+"\n"+deckText(r.player_c_deck)+"\n"}
async function copyText(txt){try{await navigator.clipboard.writeText(txt);toast("Copiado.","ok")}catch(e){var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();toast("Copiado.","ok")}}
function downloadText(filename,txt){var blob=new Blob([txt],{type:"text/plain;charset=utf-8"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove()},300)}
function updateStats(rows){var submitted=rows.filter(function(r){return rowStatus(r)==="submitted"||isValid(r)}).length;var draft=rows.filter(function(r){return rowStatus(r)==="draft"&&!isValid(r)}).length;var invalid=rows.filter(function(r){return !isValid(r)}).length;$("countPill").textContent=rows.length+" equipo"+(rows.length===1?"":"s");$("submittedPill").textContent=submitted+" submitted";$("draftPill").textContent=draft+" draft";$("invalidPill").textContent=invalid+" inválido"+(invalid===1?"":"s")}
function filteredRows(){var q=String($("searchInput").value||"").toLowerCase().trim();var f=$("statusFilter").value;return allRows.filter(function(r){var valid=isValid(r),st=rowStatus(r);if(f==="submitted"&&!(valid||st==="submitted"))return false;if(f==="draft"&&st!=="draft")return false;if(f==="invalid"&&valid)return false;if(q){var hay=[r.team_name,r.country,r.captain_email,r.captain_contact,r.player_a_name,r.player_b_name,r.player_c_name].join(" ").toLowerCase();if(hay.indexOf(q)<0)return false}return true})}
function render(){var rows=filteredRows();updateStats(allRows);var list=$("list");list.innerHTML="";if(!rows.length){list.innerHTML='<div class="card"><div class="empty">No hay registros con esos filtros.</div></div>';return}rows.forEach(function(r,idx){var valid=isValid(r),st=rowStatus(r);var sels=(r.selection_cards||[]).map(function(c){return c.name}).filter(Boolean).join(" / ")||"—";var issues=(r.validation_report&&r.validation_report.issues||[]).filter(function(i){return i.type==="err"}).slice(0,12);var div=document.createElement("article");div.className="card";div.innerHTML='<div class="cardHead"><div><div class="teamName">'+esc(r.team_name||"Sin nombre")+'</div><div class="small">'+esc(r.country||"—")+' • '+esc(r.captain_email||r.captain_contact||"—")+'</div></div><span class="pill '+(valid?'ok':'err')+'">'+(valid?'VALID':'INVALID')+'</span></div><div class="cardBody"><div class="meta"><span class="pill '+(st==='submitted'?'ok':'warn')+'">'+esc(st)+'</span><span class="pill">Actualizado: '+esc(r.updated_at||r.created_at||'')+'</span><span class="pill sel">Selection: '+esc(sels)+'</span><button class="btn tiny primary copyTeam" data-i="'+idx+'">Copiar equipo TXT</button><button class="btn tiny blue downloadTeam" data-i="'+idx+'">Descargar TXT</button></div><div class="players"><div class="playerBox"><h3><span>A — '+esc(r.player_a_name||'')+'</span></h3><div class="deckTools"><button class="btn tiny copyDeck" data-i="'+idx+'" data-p="a">Copiar A</button></div><pre>'+esc(deckText(r.player_a_deck))+'</pre></div><div class="playerBox"><h3><span>B — '+esc(r.player_b_name||'')+'</span><span>Capitán</span></h3><div class="deckTools"><button class="btn tiny copyDeck" data-i="'+idx+'" data-p="b">Copiar B</button></div><pre>'+esc(deckText(r.player_b_deck))+'</pre></div><div class="playerBox"><h3><span>C — '+esc(r.player_c_name||'')+'</span></h3><div class="deckTools"><button class="btn tiny copyDeck" data-i="'+idx+'" data-p="c">Copiar C</button></div><pre>'+esc(deckText(r.player_c_deck))+'</pre></div></div>'+(issues.length?'<div class="issues"><strong>Errores:</strong>'+issues.map(function(i){return '<div class="issue"><strong>'+esc(i.title||'Error')+'</strong>'+esc(i.body||'')+'</div>'}).join('')+'</div>':'')+'</div>';list.appendChild(div)});
  document.querySelectorAll(".copyTeam").forEach(function(b){b.onclick=function(){copyText(teamTxt(rows[Number(b.dataset.i)]))}});
  document.querySelectorAll(".downloadTeam").forEach(function(b){b.onclick=function(){var r=rows[Number(b.dataset.i)];downloadText((r.team_name||"team").replace(/[^a-z0-9_-]+/gi,"-")+".txt",teamTxt(r))}});
  document.querySelectorAll(".copyDeck").forEach(function(b){b.onclick=function(){var r=rows[Number(b.dataset.i)],p=b.dataset.p;var deck=p==="a"?r.player_a_deck:p==="b"?r.player_b_deck:r.player_c_deck;var name=p==="a"?r.player_a_name:p==="b"?r.player_b_name:r.player_c_name;copyText((name||"Deck "+p.toUpperCase())+"\n"+deckText(deck))}})
}
async function loadRows(){if(!window.supabase){toast("No cargó Supabase JS.","err");return}if(!sb)sb=window.supabase.createClient(SURL,SKEY);$("list").innerHTML='<div class="card"><div class="empty">Cargando registros...</div></div>';var res=await sb.from("team_registrations").select("*").eq("event_slug",EVENT).order("updated_at",{ascending:false});if(res.error){$("list").innerHTML='<div class="card"><div class="empty">No se pudo cargar: '+esc(res.error.message)+'</div></div>';toast("No se pudo cargar: "+res.error.message,"err");return}allRows=res.data||[];render();toast("Registros actualizados.","ok")}
$("refreshBtn").onclick=loadRows;$("clearBtn").onclick=function(){$("searchInput").value="";$("statusFilter").value="all";render()};$("searchInput").oninput=render;$("statusFilter").onchange=render;$("copySubmittedBtn").onclick=function(){var rows=allRows.filter(function(r){return isValid(r)||rowStatus(r)==="submitted"});copyText(rows.map(teamTxt).join("\n==============================\n\n")||"No hay submitted.")};$("downloadSubmittedBtn").onclick=function(){var rows=allRows.filter(function(r){return isValid(r)||rowStatus(r)==="submitted"});downloadText("neogoat-world-cup-submitted-decks.txt",rows.map(teamTxt).join("\n==============================\n\n")||"No hay submitted.")};
loadRows();
</script>
</body>
</html>
