<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoGoat Deck Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;color:#f0f0f0;font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
button,input,textarea{font:inherit;}
#header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#111;border-bottom:1px solid #222;flex-shrink:0;flex-wrap:wrap;}
#header h1{font-size:15px;font-weight:700;}
#fmtLabel{font-size:11px;color:#888;font-weight:400;}
#statusBadge{font-size:11px;padding:2px 8px;border-radius:999px;background:#1a3a1a;color:#8fff8f;border:1px solid #2a6a2a;}
#statusBadge.err{background:#3a1a1a;color:#ff8f8f;border-color:#6a2a2a;}
.hbtn{padding:5px 11px;border-radius:7px;border:1px solid #333;background:#181818;color:#f0f0f0;cursor:pointer;font-size:12px;}
.hbtn:hover{background:#222;}
#shareBtn{background:#1a3a1a;border-color:#2a6a2a;color:#8fff8f;font-weight:600;}
.spacer{flex:1;}
#app{display:grid;grid-template-columns:260px 1fr;flex:1;overflow:hidden;min-height:0;}
#searchPanel{background:#111;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
#searchTop{padding:8px;flex-shrink:0;}
#searchTop input{width:100%;padding:7px 10px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:8px;color:#f0f0f0;font-size:13px;}
#searchTop input:focus{outline:none;border-color:#444;}
#searchResults{flex:1;overflow-y:auto;padding:4px;min-height:0;display:block;}
.scard{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:7px;cursor:pointer;border:1px solid transparent;}
.scard:hover{background:#181818;border-color:#2a2a2a;}
.scard img{width:32px;height:46px;object-fit:cover;border-radius:3px;flex-shrink:0;background:#1a1a1a;}
.scard .sname{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.sadd{padding:2px 7px;border-radius:5px;border:1px solid #333;background:#181818;color:#f0f0f0;cursor:pointer;font-size:11px;flex-shrink:0;}
.sadd:hover{background:#8fff8f;color:#000;border-color:#8fff8f;}
#deckArea{display:flex;flex-direction:column;overflow:hidden;min-height:0;}
#deckTop{display:flex;align-items:stretch;gap:0;flex-shrink:0;background:#111;border-bottom:1px solid #1e1e1e;}
#deckTabs{display:flex;gap:4px;padding:8px 10px 0;flex:1;}
.dtab{padding:6px 14px;border-radius:7px 7px 0 0;border:1px solid #222;border-bottom:none;cursor:pointer;font-size:12px;color:#888;background:#0d0d0d;}
.dtab.active{background:#0d0d0d;color:#fff;border-color:#333;position:relative;bottom:-1px;z-index:1;}
#deckBar{padding:4px 12px;font-size:11px;background:#111;border-bottom:1px solid #1e1e1e;flex-shrink:0;display:flex;gap:12px;align-items:center;}
#validation.ok{color:#8fff8f;}
#validation.err{color:#ff8f8f;}
#deckMain{display:flex;flex:1;overflow:hidden;min-height:0;}
#deckGrid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:6px;align-content:start;}
#cardPreviewPanel{width:160px;flex-shrink:0;background:#0a0a0a;border-left:1px solid #1e1e1e;padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px;overflow:hidden;}
#previewImg{width:140px;border-radius:6px;display:none;}
#previewName{font-size:11px;font-weight:700;text-align:center;color:#fff;}
#previewInfo{font-size:10px;color:#888;text-align:center;line-height:1.5;}
#emptyDeck{grid-column:1/-1;text-align:center;padding:40px;color:#333;font-size:13px;}
.dcard{position:relative;cursor:pointer;border-radius:5px;overflow:hidden;border:2px solid transparent;transition:border-color .1s;}
.dcard:hover{border-color:#555;}
.dcard img{width:100%;display:block;background:#1a1a1a;}
.dcard .dqty{position:absolute;top:2px;left:2px;background:rgba(0,0,0,.75);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;}
.dcard .drem{position:absolute;top:2px;right:2px;background:rgba(180,0,0,.85);color:#fff;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;}
.dcard:hover .drem{display:flex;}
.dcard.limited{border-color:#c8a000;}
.dcard.semi{border-color:#0080c8;}
.dcard.forbidden{border-color:#c80000;opacity:.5;}
#modalOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;}
#modalOverlay.open{display:flex;}
#modal{background:#111;border:1px solid #333;border-radius:14px;padding:24px;width:440px;max-width:95vw;display:flex;flex-direction:column;gap:12px;}
#modal h2{font-size:16px;color:#8fff8f;}
#modal p{font-size:12px;color:#777;}
.mfield{display:flex;flex-direction:column;gap:4px;}
.mfield label{font-size:11px;color:#888;}
.mfield input,.mfield textarea{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:7px;color:#f0f0f0;padding:8px 10px;font-size:13px;}
.mfield textarea{resize:vertical;min-height:60px;}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.mactions button{padding:8px 16px;border-radius:7px;border:1px solid #333;background:#181818;color:#f0f0f0;cursor:pointer;}
#submitBtn{background:#1a3a1a;border-color:#2a6a2a;color:#8fff8f;font-weight:700;}
#submitBtn:disabled{opacity:.4;cursor:not-allowed;}
#modalMsg{font-size:12px;min-height:16px;}
#modalMsg.ok{color:#8fff8f;}
#modalMsg.err{color:#ff8f8f;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#0d0d0d;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px;}
</style>
</head>
<body>
<div id="header">
  <h1>NeoGoat Deck Builder <span id="fmtLabel">April 2026 Format</span></h1>
  <span id="statusBadge">Loading...</span>
  <div class="spacer"></div>
  <button class="hbtn" id="saveBtn">Save</button>
  <button class="hbtn" id="loadBtn">Load</button>
  <button class="hbtn" id="clearBtn">New</button>
  <button class="hbtn" id="exportBtn">Export</button>
  <button class="hbtn" id="shareBtn">Share Deck</button>
  <button class="hbtn" onclick="location.href='/decks.html'">Deck Library</button>
</div>
<div id="app">
  <div id="searchPanel">
    <div id="searchTop"><input id="searchInput" placeholder="Search cards..." autocomplete="off"></div>
    <div id="searchResults"></div>
  </div>
  <div id="deckArea">
    <div id="deckTop">
      <div id="deckTabs">
        <div class="dtab active" data-tab="main">Main (<span id="cntMain">0</span>)</div>
        <div class="dtab" data-tab="extra">Extra (<span id="cntExtra">0</span>)</div>
        <div class="dtab" data-tab="side">Side (<span id="cntSide">0</span>)</div>
      </div>
    </div>
    <div id="deckBar"><span id="validation" class="err">Main 0/40-60</span></div>
    <div id="deckMain">
      <div id="deckGrid"><div id="emptyDeck">Add cards from the search panel</div></div>
      <div id="cardPreviewPanel">
        <img id="previewImg" alt="">
        <div id="previewName"></div>
        <div id="previewInfo"></div>
      </div>
    </div>
  </div>
</div>
<div id="modalOverlay">
  <div id="modal">
    <h2>Share Deck</h2>
    <p>Your deck will be reviewed before being published.</p>
    <div class="mfield"><label>Deck name *</label><input id="fTitle" placeholder="e.g. Chaos Warrior April 2026" maxlength="80"></div>
    <div class="mfield"><label>Your name / alias *</label><input id="fAuthor" placeholder="e.g. Tona" maxlength="40"></div>
    <div class="mfield"><label>Archetype</label><input id="fArchetype" placeholder="e.g. Chaos Warrior..." maxlength="60"></div>
    <div class="mfield"><label>Description / strategy</label><textarea id="fDesc" placeholder="Briefly explain how the deck works..."></textarea></div>
    <div id="modalMsg"></div>
    <div class="mactions"><button id="cancelBtn">Cancel</button><button id="submitBtn">Submit Deck</button></div>
  </div>
</div>
<script>
var SURL="https://tpkqfvizizjbunpbutlo.supabase.co";
var SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwa3Fmdml6aXpqYnVucGJ1dGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA0ODksImV4cCI6MjA5NDAzNjQ4OX0.Vjf2aUfYcHzAR6f3kFBoelJNpP-l0ULwdtQsetV3Eng";
var IMG="https://images.ygoprodeck.com/images/cards_small/";
function ci(id){return IMG+id+".jpg";}
function slug(t){return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s-]/g,"").trim().replace(/\s+/g,"-")+"-"+Date.now();}
async function submitDeck(p){
  var r=await fetch(SURL+"/rest/v1/decks",{method:"POST",headers:{"Content-Type":"application/json","apikey":SKEY,"Authorization":"Bearer "+SKEY,"Prefer":"return=representation"},body:JSON.stringify(p)});
  if(!r.ok){var e=await r.json();throw new Error(e.message||"Save error");}
  return r.json();
}
(async function(){
  var LS="neogoat_v3",cardList=[],cardMap={},rules={},fmtId="apr_2026",tab="main";
  var deck={main:new Map(),extra:new Map(),side:new Map()};
  var banLimit={"forbidden":0,"limited":1,"semi-limited":2,"unlimited":3};
  function cnt(s){var t=0;deck[s].forEach(function(v){t+=v;});return t;}
  function copies(id){return(deck.main.get(id)||0)+(deck.extra.get(id)||0)+(deck.side.get(id)||0);}
  function lim(id){return rules[id]?rules[id].limit:3;}
  function bc(id){var l=lim(id);if(l===0)return "forbidden";if(l===1)return "limited";if(l===2)return "semi";return "";}
  function validate(){
    var errs=[];
    if(cnt("main")<40||cnt("main")>60)errs.push("Main "+cnt("main")+"/40-60");
    if(cnt("extra")>15)errs.push("Extra max 15");
    if(cnt("side")>15)errs.push("Side max 15");
    var v=document.getElementById("validation");
    if(errs.length){v.textContent=errs.join(" | ");v.className="err";}
    else{v.textContent="Deck OK";v.className="ok";}
    return errs.length===0;
  }
  function renderDeck(){
    var g=document.getElementById("deckGrid");g.innerHTML="";
    document.getElementById("cntMain").textContent=cnt("main");
    document.getElementById("cntExtra").textContent=cnt("extra");
    document.getElementById("cntSide").textContent=cnt("side");
    validate();
    if(deck[tab].size===0){g.innerHTML="<div id='emptyDeck'>Add cards from the search panel</div>";return;}
    deck[tab].forEach(function(qty,id){
      var d=document.createElement("div");d.className="dcard "+bc(id);
      d.innerHTML="<img src='"+ci(id)+"' loading='lazy'><div class='dqty'>"+qty+"x</div><div class='drem' onclick=\"window.rc('"+id+"')\">-</div>";
      d.querySelector("img").onclick=function(){showP(id);};
      g.appendChild(d);
    });
  }
  window.rc=function(id){var q=deck[tab].get(id)||0;if(q<=1)deck[tab].delete(id);else deck[tab].set(id,q-1);renderDeck();};
  function addCard(id){
    if(!rules[id]||!rules[id].legal)return;
    if(rules[id].limit===0)return;
    if(copies(id)>=rules[id].limit)return;
    deck[tab].set(id,(deck[tab].get(id)||0)+1);renderDeck();
  }
  function showP(id){
    var c=cardMap[id];if(!c)return;
    var img=document.getElementById("previewImg");
    img.src=ci(id);img.style.display="block";
    document.getElementById("previewName").textContent=c.name;
    var lbl=["Forbidden","Limited","Semi-Limited","Unlimited"];
    var l=lim(id);
    document.getElementById("previewInfo").innerHTML=(c.type||"")+(c.subType?" / "+c.subType:"")+"<br>"+(c.attribute||"")+(c.monsterType?" / "+c.monsterType:"")+"<br><b>"+(lbl[l]!==undefined?lbl[l]:"Unlimited")+"</b>";
  }
  function renderSearch(q){
    var el=document.getElementById("searchResults");el.innerHTML="";
    q=q.toLowerCase();var shown=0;
    for(var i=0;i<cardList.length&&shown<80;i++){
      var c=cardList[i];
      if(q.length>0&&c.name.toLowerCase().indexOf(q)<0)continue;
      shown++;
      var id=c.password;
      var d=document.createElement("div");d.className="scard";
      d.innerHTML="<img src='"+ci(id)+"' loading='lazy'><span class='sname'>"+c.name+"</span><button class='sadd'>Add</button>";
      (function(cid){
        d.querySelector("img").onclick=function(){showP(cid);};
        d.querySelector(".sadd").onclick=function(){addCard(cid);};
        d.onmouseenter=function(){showP(cid);};
      })(id);
      el.appendChild(d);
    }
  }
  document.getElementById("searchInput").addEventListener("input",function(){renderSearch(document.getElementById("searchInput").value);});
  document.querySelectorAll(".dtab").forEach(function(t){
    t.addEventListener("click",function(){
      document.querySelectorAll(".dtab").forEach(function(x){x.classList.remove("active");});
      t.classList.add("active");tab=t.dataset.tab;renderDeck();
    });
  });
  document.getElementById("saveBtn").onclick=function(){localStorage.setItem(LS,JSON.stringify({main:[...deck.main],extra:[...deck.extra],side:[...deck.side]}));alert("Saved locally");};
  document.getElementById("loadBtn").onclick=function(){var r=localStorage.getItem(LS);if(!r){alert("No saved deck");return;}var o=JSON.parse(r);deck.main=new Map(o.main);deck.extra=new Map(o.extra);deck.side=new Map(o.side);renderDeck();};
  document.getElementById("clearBtn").onclick=function(){deck.main.clear();deck.extra.clear();deck.side.clear();renderDeck();};
  document.getElementById("exportBtn").onclick=function(){
    var t="# Main\n";deck.main.forEach(function(q,id){t+=q+" "+(cardMap[id]?cardMap[id].name:id)+"\n";});
    t+="\n# Extra\n";deck.extra.forEach(function(q,id){t+=q+" "+(cardMap[id]?cardMap[id].name:id)+"\n";});
    t+="\n# Side\n";deck.side.forEach(function(q,id){t+=q+" "+(cardMap[id]?cardMap[id].name:id)+"\n";});
    navigator.clipboard.writeText(t);alert("Copied to clipboard");
  };
  var overlay=document.getElementById("modalOverlay"),msg=document.getElementById("modalMsg");
  document.getElementById("shareBtn").onclick=function(){if(!validate()){alert("Deck must be valid (40-60 Main cards).");return;}msg.textContent="";msg.className="";overlay.classList.add("open");};
  document.getElementById("cancelBtn").onclick=function(){overlay.classList.remove("open");};
  overlay.addEventListener("click",function(e){if(e.target===overlay)overlay.classList.remove("open");});
  function serialize(s){var r=[];deck[s].forEach(function(qty,id){r.push({name:cardMap[id]?cardMap[id].name:id,qty:qty});});return r;}
  document.getElementById("submitBtn").onclick=async function(){
    var title=document.getElementById("fTitle").value.trim(),author=document.getElementById("fAuthor").value.trim();
    if(!title||!author){msg.textContent="Name and alias required.";msg.className="err";return;}
    var btn=document.getElementById("submitBtn");btn.disabled=true;btn.textContent="Sending...";msg.textContent="";
    try{
      await submitDeck({slug:slug(title),title:title,author_name:author,format:fmtId,archetype:document.getElementById("fArchetype").value.trim()||null,description:document.getElementById("fDesc").value.trim()||null,main_deck:serialize("main"),side_deck:serialize("side"),extra_deck:serialize("extra"),is_public:false});
      msg.textContent="Deck submitted! Will appear once approved.";msg.className="ok";btn.textContent="Submitted!";
      setTimeout(function(){overlay.classList.remove("open");btn.disabled=false;btn.textContent="Submit Deck";document.getElementById("fTitle").value="";document.getElementById("fAuthor").value="";document.getElementById("fArchetype").value="";document.getElementById("fDesc").value="";},3000);
    }catch(e){msg.textContent="Error: "+e.message;msg.className="err";btn.disabled=false;btn.textContent="Submit Deck";}
  };
  var sb=document.getElementById("statusBadge");
  try{
    var cfg=await(await fetch("/data/config.json")).json();
    fmtId=cfg.currentFormatId||"apr_2026";
    var rf=cfg.rulesFile||"cards_april_2026_final.json";
    var resp=await fetch("/data/formats/"+fmtId+"/"+rf);
    if(!resp.ok)throw new Error("404: "+fmtId+"/"+rf);
    cardList=await resp.json();
    cardList.forEach(function(c){
      cardMap[c.password]=c;
      var bs=(c.ban_status||"unlimited").toLowerCase();
      rules[c.password]={legal:bs!=="forbidden",limit:banLimit[bs]!=null?banLimit[bs]:3};
    });
    sb.textContent=cardList.length+" cards loaded";sb.className="";
    renderSearch("");renderDeck();
  }catch(e){console.error(e);sb.textContent="Failed loading cards";sb.className="err";}
})();
</script>
</body>
</html>
