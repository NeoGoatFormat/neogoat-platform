<!doctype html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoGoat Deck Builder</title>
<style>
body { margin:0; background:#0b0b0b; color:#f2f2f2; font-family:system-ui,sans-serif; }
header { padding:14px; border-bottom:1px solid #222; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
input, select, button { font:inherit; }
input { padding:8px 10px; border-radius:8px; border:1px solid #333; background:#111; color:white; }
select { padding:7px 8px; border-radius:8px; border:1px solid #333; background:#111; color:white; }
button { padding:7px 10px; border-radius:8px; border:1px solid #333; background:#151515; color:white; cursor:pointer; }
button:hover { background:#1a1a1a; }
main { display:grid; grid-template-columns: 1fr 420px; gap:14px; padding:14px; }
.card { border:1px solid #222; background:#101010; padding:12px; border-radius:12px; }
.list { display:flex; flex-direction:column; gap:8px; max-height:70vh; overflow:auto; }
.row { display:flex; justify-content:space-between; gap:10px; }
.name { font-weight:700; }
.small { font-size:12px; opacity:.8; }
.tab { padding:5px 10px; border:1px solid #333; border-radius:999px; cursor:pointer; font-size:12px; }
.tab.active { background:#1b1b1b; }
.tabs { display:flex; gap:8px; margin:10px 0; }
.err { color:#ff8080; font-size:12px; }
.ok { color:#8fff8f; font-size:12px; }

/* Share button */
#shareBtn {
background: #1a3a1a;
border-color: #2a6a2a;
color: #8fff8f;
}
#shareBtn:hover { background: #1f4a1f; }

/* Modal overlay */
#modalOverlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.75);
z-index: 100;
align-items: center;
justify-content: center;
}
#modalOverlay.open { display: flex; }
#modal {
background: #111;
border: 1px solid #333;
border-radius: 16px;
padding: 28px;
width: 480px;
max-width: 95vw;
display: flex;
flex-direction: column;
gap: 14px;
}
#modal h2 { margin: 0; font-size: 18px; color: #8fff8f; }
#modal .field { display: flex; flex-direction: column; gap: 5px; }
#modal label { font-size: 12px; opacity: .7; }
#modal input, #modal textarea, #modal select {
width: 100%;
box-sizing: border-box;
background: #0b0b0b;
border: 1px solid #333;
border-radius: 8px;
color: white;
padding: 9px 11px;
font: inherit;
}
#modal textarea { resize: vertical; min-height: 70px; }
#modal .actions { display: flex; gap: 10px; justify-content: flex-end; }
#modal .actions button { padding: 9px 18px; }
#submitBtn {
background: #1a3a1a;
border-color: #2a6a2a;
color: #8fff8f;
font-weight: 700;
}
#submitBtn:hover { background: #1f4a1f; }
#submitBtn:disabled { opacity: .5; cursor: not-allowed; }
#modalMsg { font-size: 13px; min-height: 18px; }
#modalMsg.ok { color: #8fff8f; }
#modalMsg.err { color: #ff8080; }

/* Deck library link */
#libraryLink {
font-size: 12px;
opacity: .6;
text-decoration: none;
color: inherit;
border: 1px solid #222;
border-radius: 8px;
padding: 7px 10px;
}
#libraryLink:hover { opacity: 1; }
</style>

</head>
<body>

<header>
  <h2>NeoGoat Deck Builder</h2>
  <div id="status">Loading...</div>
  <div style="flex:1"></div>
  <input id="search" placeholder="Search card name...">
  <button id="saveBtn">Save</button>
  <button id="loadBtn">Load</button>
  <button id="clearBtn">New</button>
  <button id="exportBtn">Export</button>
  <button id="shareBtn">⬆️ Share Deck</button>
  <a href="/decks.html" id="libraryLink">📚 Deck Library</a>
</header>

<main>
  <section class="card">
    <h3>Results</h3>
    <div class="list" id="results"></div>
  </section>

  <aside class="card">
    <h3>Deck</h3>
    <div class="tabs">
      <div class="tab active" data-tab="main">Main (<span id="mainCount">0</span>)</div>
      <div class="tab" data-tab="extra">Extra (<span id="extraCount">0</span>)</div>
      <div class="tab" data-tab="side">Side (<span id="sideCount">0</span>)</div>
    </div>
    <div class="list" id="deckList"></div>
    <div id="validation" class="small"></div>
  </aside>
</main>

<!-- Share Modal -->

<div id="modalOverlay">
  <div id="modal">
    <h2>⬆️ Share Deck</h2>
    <p style="margin:0;font-size:13px;opacity:.6;">Tu deck quedara en revision antes de publicarse en la biblioteca.</p>


<div class="field">
  <label>Nombre del deck *</label>
  <input id="fTitle" placeholder="Ej: Chaos Warrior April 2026" maxlength="80">
</div>
<div class="field">
  <label>Tu nombre / alias *</label>
  <input id="fAuthor" placeholder="Ej: Tona" maxlength="40">
</div>
<div class="field">
  <label>Arquetipo</label>
  <input id="fArchetype" placeholder="Ej: Chaos Warrior, Gravekeeper, OTK..." maxlength="60">
</div>
<div class="field">
  <label>Descripcion / estrategia</label>
  <textarea id="fDesc" placeholder="Explica brevemente como funciona el deck..."></textarea>
</div>

<div id="modalMsg"></div>

<div class="actions">
  <button id="cancelBtn">Cancelar</button>
  <button id="submitBtn">Enviar Deck</button>
</div>


  </div>
</div>

<script>
// --- Supabase config -------------------------------------------
const SUPABASE_URL = "https://tpkqfvizizjbunpbutlo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwa3Fmdml6aXpqYnVucGJ1dGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA0ODksImV4cCI6MjA5NDAzNjQ4OX0.Vjf2aUfYcHzAR6f3kFBoelJNpP-l0ULwdtQsetV3Eng";

function generateSlug(title) {
  return title
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    + '-' + Date.now();
}

async function saveDeckToSupabase(payload) {
  const res = await fetch(${SUPABASE_URL}/rest/v1/decks, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || 'Error al guardar');
  }
  return await res.json();
}

// --- App state -------------------------------------------------
(async function(){
  const LS_KEY = "neogoat_local_v1";
  let cards = {};
  let rules = {};
  let legalIds = [];
  let currentTab = "main";
  let currentFormatId = "april2026";
  let deck = {
    main: new Map(),
    extra: new Map(),
    side: new Map()
  };

  function count(section){
    let t=0;
    for (let v of deck[section].values()) t+=v;
    return t;
  }

  function totalCopies(id){
    return (deck.main.get(id)||0)+(deck.extra.get(id)||0)+(deck.side.get(id)||0);
  }

  function renderDeck(){
    const list = document.getElementById("deckList");
    list.innerHTML="";
    const section = deck[currentTab];
    for (let [id,qty] of section){
      const c = cards[id];
      const div = document.createElement("div");
      div.className="row";
      div.innerHTML = `
        <div>
          <div class="name">${qty}x ${c.name}</div>
          <div class="small">Limit: ${rules[id]?.limit ?? "-"}</div>
        </div>
        <div>
          <button onclick="addCard('${id}')">+</button>
          <button onclick="removeCard('${id}')">-</button>
        </div>
      `;
      list.appendChild(div);
    }
    document.getElementById("mainCount").textContent=count("main");
    document.getElementById("extraCount").textContent=count("extra");
    document.getElementById("sideCount").textContent=count("side");
    validateDeck();
  }

  function validateDeck(){
    let errors=[];
    let mainCount=count("main");
    let extraCount=count("extra");
    let sideCount=count("side");
    if(mainCount<40||mainCount>60) errors.push("Main must be 40-60");
    if(extraCount>15) errors.push("Extra max 15");
    if(sideCount>15) errors.push("Side max 15");
    for(let id of legalIds){
      let limit=rules[id]?.limit;
      if(limit!=null && totalCopies(id)>limit)
        errors.push(cards[id].name+" exceeds limit");
    }
    const val=document.getElementById("validation");
    if(errors.length){
      val.innerHTML=errors.join("<br>");
      val.className="err";
    }else{
      val.textContent="Deck OK";
      val.className="ok";
    }
    return errors.length === 0;
  }

  window.addCard=function(id){
    if(!rules[id]?.legal) return;
    let limit=rules[id]?.limit;
    if(limit!=null && totalCopies(id)>=limit) return;
    let section=deck[currentTab];
    section.set(id,(section.get(id)||0)+1);
    renderDeck();
  }

  window.removeCard=function(id){
    let section=deck[currentTab];
    let q=section.get(id)||0;
    if(q<=1) section.delete(id);
    else section.set(id,q-1);
    renderDeck();
  }

  function renderResults(query){
    const list=document.getElementById("results");
    list.innerHTML="";
    query=query.toLowerCase();
    for(let id of legalIds){
      const c=cards[id];
      if(!c.name.toLowerCase().includes(query)) continue;
      const div=document.createElement("div");
      div.className="row";
      div.innerHTML=`
        <div>
          <div class="name">${c.name}</div>
          <div class="small">${c.type||""} ${c.attribute||""}</div>
        </div>
        <button onclick="addCard('${id}')">Add</button>
      `;
      list.appendChild(div);
    }
  }

  // --- Deck serializer para Supabase --------------------------
  function serializeDeck(section) {
    const result = [];
    for (let [id, qty] of deck[section]) {
      result.push({ name: cards[id].name, qty });
    }
    return result;
  }

  // --- Modal Share --------------------------------------------
  const overlay = document.getElementById("modalOverlay");
  const msgEl   = document.getElementById("modalMsg");

  document.getElementById("shareBtn").onclick = () => {
    const valid = validateDeck();
    if (!valid) {
      alert("El deck debe ser valido antes de compartirlo (40-60 cartas en el Main, sin exceder limites).");
      return;
    }
    msgEl.textContent = "";
    msgEl.className = "";
    overlay.classList.add("open");
  };

  document.getElementById("cancelBtn").onclick = () => {
    overlay.classList.remove("open");
  };

  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) overlay.classList.remove("open");
  });

  document.getElementById("submitBtn").onclick = async () => {
    const title     = document.getElementById("fTitle").value.trim();
    const author    = document.getElementById("fAuthor").value.trim();
    const archetype = document.getElementById("fArchetype").value.trim();
    const desc      = document.getElementById("fDesc").value.trim();

    if (!title || !author) {
      msgEl.textContent = "Nombre del deck y alias son obligatorios.";
      msgEl.className = "err";
      return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Enviando...";
    msgEl.textContent = "";

    const payload = {
      slug:        generateSlug(title),
      title,
      author_name: author,
      format:      currentFormatId,
      archetype:   archetype || null,
      description: desc || null,
      main_deck:   serializeDeck("main"),
      side_deck:   serializeDeck("side"),
      extra_deck:  serializeDeck("extra"),
      is_public:   false
    };

    try {
      await saveDeckToSupabase(payload);
      msgEl.textContent = " Deck enviado. Quedara visible una vez aprobado.";
      msgEl.className = "ok";
      btn.textContent = "Enviado OK";
      // Limpiar form despues de 3s y cerrar
      setTimeout(() => {
        overlay.classList.remove("open");
        btn.disabled = false;
        btn.textContent = "Enviar Deck";
        document.getElementById("fTitle").value = "";
        document.getElementById("fAuthor").value = "";
        document.getElementById("fArchetype").value = "";
        document.getElementById("fDesc").value = "";
      }, 3000);
    } catch(e) {
      msgEl.textContent = "ERROR: Error: " + e.message;
      msgEl.className = "err";
      btn.disabled = false;
      btn.textContent = "Enviar Deck";
    }
  };

  // --- Controles existentes -----------------------------------
  document.getElementById("search").addEventListener("input",e=>{
    renderResults(e.target.value);
  });

  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click",()=>{
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      currentTab=tab.dataset.tab;
      renderDeck();
    });
  });

  document.getElementById("saveBtn").onclick=()=>{
    localStorage.setItem(LS_KEY,JSON.stringify({
      main:[...deck.main],
      extra:[...deck.extra],
      side:[...deck.side]
    }));
    alert("Saved locally");
  };

  document.getElementById("loadBtn").onclick=()=>{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return alert("No saved deck");
    const obj=JSON.parse(raw);
    deck.main=new Map(obj.main);
    deck.extra=new Map(obj.extra);
    deck.side=new Map(obj.side);
    renderDeck();
  };

  document.getElementById("clearBtn").onclick=()=>{
    deck.main.clear();
    deck.extra.clear();
    deck.side.clear();
    renderDeck();
  };

  document.getElementById("exportBtn").onclick=()=>{
    let text="# Main\n";
    for(let [id,q] of deck.main) text+=q+" "+cards[id].name+"\n";
    text+="\n# Extra\n";
    for(let [id,q] of deck.extra) text+=q+" "+cards[id].name+"\n";
    text+="\n# Side\n";
    for(let [id,q] of deck.side) text+=q+" "+cards[id].name+"\n";
    navigator.clipboard.writeText(text);
    alert("Copied to clipboard");
  };

  // --- Carga inicial ------------------------------------------
  try{
    const cfg=await (await fetch('/data/config.json')).json();
    currentFormatId = cfg.currentFormatId || "april2026";
    cards=await (await fetch('/data/cards_catalog.json')).json();
    rules=await (await fetch(/data/formats/${cfg.currentFormatId}/rules.json)).json();
    legalIds=Object.keys(rules).filter(id=>rules[id]?.legal===true);
    document.getElementById("status").textContent="Ready OK";
    renderResults("");
    renderDeck();
  }catch(e){
    console.error(e);
    document.getElementById("status").textContent="Failed loading JSON";
  }

})();
</script>

</body>
</html>
