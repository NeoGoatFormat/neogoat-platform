<!doctype html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoGoat – Deck</title>
<style>
* { box-sizing: border-box; }
body { margin:0; background:#0b0b0b; color:#f2f2f2; font-family:system-ui,sans-serif; }
header {
  padding:14px 20px;
  border-bottom:1px solid #222;
  display:flex;
  gap:12px;
  align-items:center;
}
header a {
  font-size:13px;
  color:#f2f2f2;
  text-decoration:none;
  border:1px solid #333;
  padding:6px 12px;
  border-radius:8px;
  opacity:.7;
}
header a:hover { opacity:1; }

.page { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

.deck-header { margin-bottom:24px; }
.deck-header h1 { margin:0 0 6px; font-size:26px; }
.meta { font-size:13px; opacity:.6; margin-bottom:10px; }
.archetype {
display:inline-block;
font-size:13px;
color:#8fff8f;
background:#1a3a1a;
border:1px solid #2a6a2a;
border-radius:999px;
padding:3px 12px;
margin-bottom:12px;
}
.description {
font-size:14px;
opacity:.8;
line-height:1.6;
background:#0f0f0f;
border:1px solid #1e1e1e;
border-radius:10px;
padding:14px;
white-space: pre-wrap;
}

.sections { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:24px; }
@media(max-width:600px) { .sections { grid-template-columns:1fr; } }

.section {
background:#101010;
border:1px solid #222;
border-radius:12px;
padding:16px;
}
.section h3 {
margin:0 0 12px;
font-size:14px;
opacity:.7;
text-transform:uppercase;
letter-spacing:.08em;
}
.section.main-section { grid-column: 1 / -1; }
.card-list { display:flex; flex-direction:column; gap:4px; }
.card-row {
display:flex;
justify-content:space-between;
padding:5px 0;
border-bottom:1px solid #1a1a1a;
font-size:14px;
}
.card-row:last-child { border-bottom:none; }
.card-qty { opacity:.5; font-size:13px; width:22px; flex-shrink:0; }
.card-name { flex:1; }

.copy-btn {
display:inline-flex;
align-items:center;
gap:6px;
background:#151515;
border:1px solid #333;
color:white;
padding:8px 14px;
border-radius:8px;
font:inherit;
cursor:pointer;
font-size:13px;
margin-top:20px;
}
.copy-btn:hover { background:#1a1a1a; }

#loading { text-align:center; padding:80px; opacity:.5; }
#notfound { text-align:center; padding:80px; opacity:.5; }
</style>

</head>
<body>

<header>
  <a href="/decks.html">← Deck Library</a>
  <a href="/index.html" style="margin-left:auto;">🛠️ Deck Builder</a>
</header>

<div id="loading">Loading deck...</div>
<div id="notfound" style="display:none">Deck not found or not yet approved.</div>

<div class="page" id="page" style="display:none">
  <div class="deck-header">
    <h1 id="dTitle"></h1>
    <div id="dArchetype" class="archetype" style="display:none"></div>
    <div class="meta" id="dMeta"></div>
    <div id="dDesc" class="description" style="display:none"></div>
  </div>

<button class="copy-btn" id="copyBtn">📋 Copy decklist</button>

  <div class="sections" id="sections"></div>
</div>

<script>
const SUPABASE_URL = "https://tpkqfvizizjbunpbutlo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwa3Fmdml6aXpqYnVucGJ1dGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA0ODksImV4cCI6MjA5NDAzNjQ4OX0.Vjf2aUfYcHzAR6f3kFBoelJNpP-l0ULwdtQsetV3Eng";

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function totalCards(arr) {
  if (!Array.isArray(arr)) return 0;
  return arr.reduce((s, c) => s + (c.qty || 1), 0);
}

function buildSection(title, cards) {
  if (!cards || !cards.length) return null;
  const div = document.createElement("div");
  div.className = "section";
  const total = totalCards(cards);
  div.innerHTML = <h3>${escHtml(title)} (${total})</h3><div class="card-list"></div>;
  const list = div.querySelector(".card-list");
  for (const c of cards) {
    const row = document.createElement("div");
    row.className = "card-row";
    row.innerHTML = <span class="card-qty">${c.qty}x</span><span class="card-name">${escHtml(c.name)}</span>;
    list.appendChild(row);
  }
  return div;
}

function buildCopyText(deck) {
  let t = "# Main Deck\n";
  for (const c of (deck.main_deck||[])) t += ${c.qty} ${c.name}\n;
  if ((deck.extra_deck||[]).length) {
    t += "\n# Extra Deck\n";
    for (const c of deck.extra_deck) t += ${c.qty} ${c.name}\n;
  }
  if ((deck.side_deck||[]).length) {
    t += "\n# Side Deck\n";
    for (const c of deck.side_deck) t += ${c.qty} ${c.name}\n;
  }
  return t;
}

(async () => {
  const slug = new URLSearchParams(location.search).get("slug");
  if (!slug) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("notfound").style.display = "block";
    return;
  }

  try {
    const res = await fetch(
      ${SUPABASE_URL}/rest/v1/decks?slug=eq.${encodeURIComponent(slug)}&is_public=eq.true&limit=1,
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': Bearer ${SUPABASE_ANON_KEY}
        }
      }
    );
    const data = await res.json();
    const deck = data[0];

    document.getElementById("loading").style.display = "none";

    if (!deck) {
      document.getElementById("notfound").style.display = "block";
      return;
    }

    // Populate
    document.title = ${deck.title} – NeoGoat;
    document.getElementById("dTitle").textContent = deck.title;

    if (deck.archetype) {
      const el = document.getElementById("dArchetype");
      el.textContent = deck.archetype;
      el.style.display = "inline-block";
    }

    const date = new Date(deck.created_at).toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' });
    document.getElementById("dMeta").textContent =
      Por ${deck.author_name} · ${deck.format || ''} · ${date};

    if (deck.description) {
      const el = document.getElementById("dDesc");
      el.textContent = deck.description;
      el.style.display = "block";
    }

    // Sections
    const sections = document.getElementById("sections");
    const main = buildSection("Main Deck", deck.main_deck);
    if (main) { main.classList.add("main-section"); sections.appendChild(main); }
    const extra = buildSection("Extra Deck", deck.extra_deck);
    if (extra) sections.appendChild(extra);
    const side = buildSection("Side Deck", deck.side_deck);
    if (side) sections.appendChild(side);

    // Copy button
    document.getElementById("copyBtn").onclick = () => {
      navigator.clipboard.writeText(buildCopyText(deck));
      document.getElementById("copyBtn").textContent = "✅ Copied!";
      setTimeout(() => document.getElementById("copyBtn").textContent = "📋 Copy decklist", 2000);
    };

    document.getElementById("page").style.display = "block";

  } catch(e) {
    document.getElementById("loading").textContent = "Error: " + e.message;
  }
})();
</script>

</body>
</html>
