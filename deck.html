<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="neogoatbuilderlogo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoGoat – Deck</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#05070c;
  --panel:#0a0f18;
  --panel2:#070a10;
  --cyan:#00e5ff;
  --cyan2:#70f5ff;
  --violet:#9b5cff;
  --green:#73ff9b;
  --red:#ff5d73;
  --muted:#8ea0bb;
  --line:rgba(0,229,255,.22);
}

body{
  margin:0;
  color:#eafcff;
  font-family:system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 18% 15%,rgba(0,229,255,.12),transparent 28%),
    radial-gradient(circle at 75% 22%,rgba(155,92,255,.15),transparent 30%),
    radial-gradient(circle at 45% 85%,rgba(255,61,242,.07),transparent 35%),
    linear-gradient(180deg,#08111f,#05070c 55%,#020306);
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.13;
  background:
    linear-gradient(rgba(0,229,255,.08) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.08) 1px,transparent 1px);
  background-size:36px 36px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),rgba(0,0,0,.15));
}

body:after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(transparent 50%,rgba(0,0,0,.13) 51%);
  background-size:100% 4px;
  opacity:.22;
}

button{font:inherit;}

header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 18px;
  background:linear-gradient(90deg,rgba(8,16,30,.98),rgba(13,10,25,.98));
  border-bottom:1px solid rgba(0,229,255,.45);
  box-shadow:0 0 28px rgba(0,229,255,.13),0 0 36px rgba(155,92,255,.09);
  position:sticky;
  top:0;
  z-index:10;
}

.logoMark{
  width:31px;
  height:31px;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,rgba(0,229,255,.18),rgba(155,92,255,.18));
  border:1px solid rgba(0,229,255,.65);
  color:var(--cyan2);
  box-shadow:0 0 16px rgba(0,229,255,.28),inset 0 0 12px rgba(155,92,255,.16);
  font-weight:900;
}

.brand{
  font-weight:900;
  font-size:16px;
  color:#f2feff;
  text-shadow:0 0 12px rgba(0,229,255,.38);
  margin-right:auto;
}

.navBtn{
  font-size:13px;
  color:#dffcff;
  text-decoration:none;
  border:1px solid rgba(0,229,255,.32);
  padding:8px 13px;
  border-radius:9px;
  background:linear-gradient(180deg,rgba(16,27,45,.95),rgba(5,8,14,.95));
  font-weight:800;
}

.navBtn:hover{
  border-color:rgba(0,229,255,.75);
  box-shadow:0 0 18px rgba(0,229,255,.22),inset 0 0 14px rgba(0,229,255,.08);
}

#loading,#notfound{
  text-align:center;
  padding:90px 20px;
  color:#8ea0bb;
  position:relative;
  z-index:1;
}

.page{
  max-width:1180px;
  margin:0 auto;
  padding:28px 20px 40px;
  position:relative;
  z-index:1;
}

.hero{
  border:1px solid rgba(0,229,255,.26);
  border-radius:20px;
  background:
    radial-gradient(circle at 12% 20%,rgba(0,229,255,.10),transparent 35%),
    radial-gradient(circle at 85% 15%,rgba(155,92,255,.12),transparent 35%),
    linear-gradient(180deg,rgba(10,16,26,.88),rgba(3,5,9,.92));
  padding:22px;
  box-shadow:0 14px 34px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.04);
  margin-bottom:18px;
  overflow:hidden;
  position:relative;
}

.hero:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(0,229,255,.22),transparent 30%,transparent 70%,rgba(155,92,255,.20));
  opacity:.16;
  pointer-events:none;
}

.heroInner{
  position:relative;
  z-index:1;
}

.deck-header h1{
  margin:0 0 8px;
  font-size:32px;
  line-height:1.1;
  color:#f4feff;
  text-shadow:0 0 14px rgba(0,229,255,.28);
}

.meta{
  font-size:13px;
  color:#95a7c1;
  margin-bottom:12px;
}

.archetype{
  display:inline-block;
  font-size:12px;
  color:#a5ffbd;
  background:rgba(21,78,44,.45);
  border:1px solid rgba(115,255,155,.42);
  border-radius:999px;
  padding:5px 12px;
  margin-bottom:12px;
  font-weight:800;
  box-shadow:0 0 12px rgba(115,255,155,.10);
}

.description{
  font-size:14px;
  color:#c2d4ea;
  line-height:1.6;
  background:rgba(0,0,0,.23);
  border:1px solid rgba(0,229,255,.18);
  border-radius:13px;
  padding:14px;
  white-space:pre-wrap;
  margin-top:8px;
}

.counts{
  display:flex;
  flex-wrap:wrap;
  gap:9px;
  margin:18px 0 0;
}

.countBadge{
  padding:7px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  background:rgba(0,229,255,.08);
  border:1px solid rgba(0,229,255,.28);
  color:#dffcff;
}

.countBadge.extra{
  background:rgba(155,92,255,.10);
  border-color:rgba(155,92,255,.36);
}

.countBadge.side{
  background:rgba(115,255,155,.08);
  border-color:rgba(115,255,155,.28);
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:18px 0;
}

.actionBtn{
  display:inline-flex;
  align-items:center;
  gap:7px;
  background:linear-gradient(180deg,rgba(16,27,45,.95),rgba(5,8,14,.95));
  border:1px solid rgba(0,229,255,.32);
  color:#dffcff;
  padding:9px 15px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  font-weight:900;
}

.actionBtn:hover{
  border-color:rgba(0,229,255,.75);
  box-shadow:0 0 18px rgba(0,229,255,.18);
}

.mainLayout{
  display:grid;
  grid-template-columns:1fr 270px;
  gap:18px;
  align-items:start;
}

.sections{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.section{
  background:
    linear-gradient(135deg,rgba(0,229,255,.04),transparent 32%),
    linear-gradient(180deg,rgba(10,16,26,.88),rgba(3,5,9,.92));
  border:1px solid rgba(0,229,255,.22);
  border-radius:16px;
  padding:15px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 10px 22px rgba(0,0,0,.24);
  position:relative;
  overflow:hidden;
}

.section:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(0,229,255,.18),transparent 30%,transparent 70%,rgba(155,92,255,.16));
  opacity:.12;
  pointer-events:none;
}

.section.extra-section{
  border-color:rgba(155,92,255,.35);
  background:
    radial-gradient(circle at 12% 20%,rgba(155,92,255,.10),transparent 38%),
    linear-gradient(180deg,rgba(12,13,30,.90),rgba(3,5,9,.92));
}

.section.side-section{
  border-color:rgba(115,255,155,.22);
  background:
    radial-gradient(circle at 12% 20%,rgba(115,255,155,.07),transparent 38%),
    linear-gradient(180deg,rgba(8,19,17,.84),rgba(3,5,9,.92));
}

.section.main-section{
  grid-column:1 / -1;
}

.section h3{
  position:relative;
  z-index:1;
  margin:0 0 12px;
  font-size:14px;
  color:#f2feff;
  text-transform:uppercase;
  letter-spacing:.08em;
  text-shadow:0 0 9px rgba(0,229,255,.20);
}

.card-grid{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
  gap:8px;
}

.deck-card{
  position:relative;
  border-radius:8px;
  overflow:hidden;
  border:2px solid rgba(0,229,255,.18);
  background:#111827;
  cursor:pointer;
  transition:.12s ease;
  box-shadow:0 5px 14px rgba(0,0,0,.28);
}

.deck-card:hover{
  transform:translateY(-2px) scale(1.03);
  border-color:rgba(0,229,255,.75);
  box-shadow:
    0 10px 22px rgba(0,0,0,.38),
    0 0 18px rgba(0,229,255,.22);
}

.deck-card img{
  width:100%;
  display:block;
  background:#111827;
}

.deck-qty{
  position:absolute;
  top:3px;
  left:3px;
  background:rgba(0,0,0,.88);
  color:#fff;
  font-size:10px;
  font-weight:900;
  padding:2px 5px;
  border-radius:6px;
  border:1px solid rgba(0,229,255,.25);
}

.card-title-tip{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:12px 4px 4px;
  font-size:9px;
  font-weight:800;
  color:#fff;
  text-align:center;
  line-height:1.1;
  opacity:0;
  background:linear-gradient(transparent,rgba(0,0,0,.86));
  transition:.12s ease;
}

.deck-card:hover .card-title-tip{
  opacity:1;
}

.previewPanel{
  position:sticky;
  top:82px;
  background:
    radial-gradient(circle at 50% 0%,rgba(0,229,255,.13),transparent 35%),
    linear-gradient(180deg,#08111f,#030509);
  border:1px solid rgba(0,229,255,.24);
  border-radius:18px;
  padding:14px;
  min-height:370px;
  box-shadow:0 14px 34px rgba(0,0,0,.30),0 0 20px rgba(0,229,255,.08);
}

#previewImg{
  width:100%;
  max-width:230px;
  display:block;
  margin:0 auto 12px;
  border-radius:9px;
  border:1px solid rgba(0,229,255,.38);
  box-shadow:0 0 24px rgba(0,0,0,.58),0 0 20px rgba(0,229,255,.15);
}

#previewName{
  text-align:center;
  font-size:13px;
  font-weight:900;
  color:#f4feff;
  text-shadow:0 0 8px rgba(0,229,255,.24);
  margin-bottom:8px;
}

#previewHint{
  text-align:center;
  font-size:12px;
  color:#8395ad;
  line-height:1.5;
}

#toast{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:9999;
  min-width:220px;
  max-width:320px;
  padding:12px 14px;
  border-radius:12px;
  background:rgba(7,20,30,.96);
  border:1px solid rgba(0,229,255,.45);
  color:#dffcff;
  font-size:12px;
  font-weight:800;
  box-shadow:0 0 24px rgba(0,229,255,.18);
  opacity:0;
  transform:translateY(12px);
  pointer-events:none;
  transition:.18s ease;
}

#toast.show{
  opacity:1;
  transform:translateY(0);
}

@media(max-width:900px){
  .mainLayout{grid-template-columns:1fr;}
  .previewPanel{display:none;}
}

@media(max-width:650px){
  header{flex-wrap:wrap;}
  .brand{width:calc(100% - 44px);}
  .sections{grid-template-columns:1fr;}
  .deck-header h1{font-size:25px;}
}
</style>
</head>

<body>

<header>
  <div class="logoMark">◇</div>
  <div class="brand">NeoGoat Deck Viewer</div>
  <a class="navBtn" href="/decks.html">← Deck Library</a>
  <a class="navBtn" href="/index.html">Deck Builder</a>
</header>

<div id="loading">Loading deck...</div>
<div id="notfound" style="display:none">Deck not found or not yet approved.</div>

<div class="page" id="page" style="display:none">
  <div class="hero">
    <div class="heroInner">
      <div class="deck-header">
        <h1 id="dTitle"></h1>
        <div id="dArchetype" class="archetype" style="display:none"></div>
        <div class="meta" id="dMeta"></div>
        <div id="dDesc" class="description" style="display:none"></div>
      </div>

      <div class="counts">
        <div class="countBadge" id="mainCount">Main 0</div>
        <div class="countBadge extra" id="extraCount">Extra 0</div>
        <div class="countBadge side" id="sideCount">Side 0</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="actionBtn" id="copyBtn">📋 Copy decklist</button>
    <button class="actionBtn" id="builderBtn">🛠️ Open builder</button>
  </div>

  <div class="mainLayout">
    <div class="sections" id="sections"></div>

    <aside class="previewPanel">
      <img id="previewImg" src="neogoatbuilderlogo.png" alt="">
      <div id="previewName">Card Preview</div>
      <div id="previewHint">Hover over a card name to preview its image.</div>
    </aside>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = "https://tpkqfvizizjbunpbutlo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwa3Fmdml6aXpqYnVucGJ1dGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA0ODksImV4cCI6MjA5NDAzNjQ4OX0.Vjf2aUfYcHzAR6f3kFBoelJNpP-l0ULwdtQsetV3Eng";
const IMG = "https://images.ygoprodeck.com/images/cards_small/";

let cardList = [];
let cardByName = {};

function escHtml(s){
  if(!s)return "";
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function normName(n){
  return String(n||"")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[’']/g,"")
    .replace(/[^a-z0-9]+/g," ")
    .trim();
}

function totalCards(arr){
  if(!Array.isArray(arr))return 0;
  return arr.reduce((s,c)=>s+(Number(c.qty)||1),0);
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(showToast.timer);
  showToast.timer=setTimeout(()=>t.classList.remove("show"),1800);
}

async function loadCardData(){
  try{
    const cfg = await (await fetch("/data/config.json")).json();
    const fmtId = cfg.currentFormatId || "apr_2026";
    const rf = cfg.rulesFile || "cards_april_2026_final.json";
    const resp = await fetch("/data/formats/"+fmtId+"/"+rf);
    if(!resp.ok)return;

    cardList = await resp.json();
    cardList.forEach(c=>{
      cardByName[normName(c.name)] = c;
    });
  }catch(e){
    console.warn("Could not load card data",e);
  }
}

function cardImageByName(name){
  const c = cardByName[normName(name)];
  if(c && c.password)return IMG+c.password+".jpg";
  return "neogoatbuilderlogo.png";
}

function previewCard(name){
  const img=document.getElementById("previewImg");
  const title=document.getElementById("previewName");
  img.src=cardImageByName(name);
  title.textContent=name;
}

function buildSection(title,cards,typeClass){
  if(!cards||!cards.length)return null;

  const div=document.createElement("div");
  div.className="section "+(typeClass||"");

  if(title==="Main Deck"){
    div.classList.add("main-section");
  }

  const total=totalCards(cards);

  div.innerHTML=`
    <h3>${escHtml(title)} (${total})</h3>
    <div class="card-grid"></div>
  `;

  const grid=div.querySelector(".card-grid");

  for(const c of cards){
    const img=cardImageByName(c.name);
    const card=document.createElement("div");

    card.className="deck-card";
    card.title=c.name;

    card.innerHTML=`
      <img src="${img}" alt="${escHtml(c.name)}" loading="lazy">
      <div class="deck-qty">${Number(c.qty)||1}x</div>
      <div class="card-title-tip">${escHtml(c.name)}</div>
    `;

    card.addEventListener("mouseenter",()=>previewCard(c.name));
    card.addEventListener("click",()=>previewCard(c.name));

    grid.appendChild(card);
  }

  return div;
}

function buildCopyText(deck){
  let t="# Main Deck\n";
  for(const c of (deck.main_deck||[]))t+=`${c.qty} ${c.name}\n`;

  if((deck.extra_deck||[]).length){
    t+="\n# Extra Deck\n";
    for(const c of deck.extra_deck)t+=`${c.qty} ${c.name}\n`;
  }

  if((deck.side_deck||[]).length){
    t+="\n# Side Deck\n";
    for(const c of deck.side_deck)t+=`${c.qty} ${c.name}\n`;
  }

  return t;
}

(async()=>{
  const slug=new URLSearchParams(location.search).get("slug");

  if(!slug){
    document.getElementById("loading").style.display="none";
    document.getElementById("notfound").style.display="block";
    return;
  }

  await loadCardData();

  try{
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/decks?slug=eq.${encodeURIComponent(slug)}&is_public=eq.true&limit=1`,
      {
        headers:{
          "apikey":SUPABASE_ANON_KEY,
          "Authorization":`Bearer ${SUPABASE_ANON_KEY}`
        }
      }
    );

    const data=await res.json();
    const deck=data[0];

    document.getElementById("loading").style.display="none";

    if(!deck){
      document.getElementById("notfound").style.display="block";
      return;
    }

    document.title=`${deck.title} – NeoGoat`;
    document.getElementById("dTitle").textContent=deck.title;

    if(deck.archetype){
      const el=document.getElementById("dArchetype");
      el.textContent=deck.archetype;
      el.style.display="inline-block";
    }

    const date=new Date(deck.created_at).toLocaleDateString("es-MX",{year:"numeric",month:"long",day:"numeric"});
    document.getElementById("dMeta").textContent=`By ${deck.author_name} · ${deck.format||""} · ${date}`;

    if(deck.description){
      const el=document.getElementById("dDesc");
      el.textContent=deck.description;
      el.style.display="block";
    }

    document.getElementById("mainCount").textContent=`Main ${totalCards(deck.main_deck)}`;
    document.getElementById("extraCount").textContent=`Extra ${totalCards(deck.extra_deck)}`;
    document.getElementById("sideCount").textContent=`Side ${totalCards(deck.side_deck)}`;

    const sections=document.getElementById("sections");

    const main=buildSection("Main Deck",deck.main_deck,"main-section");
    if(main)sections.appendChild(main);

    const extra=buildSection("Extra Deck",deck.extra_deck,"extra-section");
    if(extra)sections.appendChild(extra);

    const side=buildSection("Side Deck",deck.side_deck,"side-section");
    if(side)sections.appendChild(side);

    const firstCard=(deck.main_deck&&deck.main_deck[0])||(deck.extra_deck&&deck.extra_deck[0])||(deck.side_deck&&deck.side_deck[0]);
    if(firstCard)previewCard(firstCard.name);

    document.getElementById("copyBtn").onclick=()=>{
      navigator.clipboard.writeText(buildCopyText(deck));
      showToast("Decklist copied!");
    };

    document.getElementById("builderBtn").onclick=()=>{
      location.href="/index.html";
    };

    document.getElementById("page").style.display="block";

  }catch(e){
    document.getElementById("loading").textContent="Error: "+e.message;
  }
})();
</script>

</body>
</html>
